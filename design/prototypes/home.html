<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 - 自律助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#34D399',
                        secondary: '#06B6D4',
                        accent: '#F59E0B',
                        danger: '#EF4444',
                        success: '#10B981',
                        background: '#F8FAFC',
                        surface: '#FFFFFF'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }
        .streak-glow {
            box-shadow: 0 0 30px rgba(52, 211, 153, 0.3);
        }
        .level-progress {
            background: linear-gradient(90deg, #34D399 0%, #10B981 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:active {
            transform: scale(0.98);
        }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(52, 211, 153, 0); }
        }
        .pulse-animation {
            animation: pulse-green 2s infinite;
        }
    </style>
</head>
<body class="bg-background">
    <!-- Status Bar -->
    <div class="flex justify-between items-center px-4 py-2 text-xs text-gray-800">
        <span class="font-medium">9:41</span>
        <div class="flex items-center space-x-1">
            <i class="fas fa-signal text-xs"></i>
            <i class="fas fa-wifi text-xs"></i>
            <div class="w-6 h-3 border border-gray-800 rounded-sm">
                <div class="w-4 h-1.5 bg-green-500 rounded-sm mt-0.5 ml-0.5"></div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <div class="bg-surface px-6 pt-4 pb-6">
        <div class="flex items-center justify-between mb-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">早上好 👋</h1>
                <p class="text-gray-600">坚持成就更好的自己</p>
            </div>
            <div class="flex items-center space-x-3">
                <button class="p-2 bg-gray-100 rounded-full">
                    <i class="fas fa-bell text-gray-600"></i>
                </button>
                <!-- 用户头像 -->
                <div class="w-10 h-10 bg-gradient-to-br from-primary to-success rounded-full flex items-center justify-center">
                    <i class="fas fa-user text-white text-sm"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="px-6 pb-20">
        <!-- Streak Counter Card -->
        <div class="bg-gradient-to-br from-primary to-success rounded-3xl p-6 mb-6 streak-glow">
            <div class="text-center text-white">
                <div class="mb-4">
                    <i class="fas fa-fire text-4xl mb-2"></i>
                    <h2 class="text-3xl font-bold">0</h2>
                    <p class="text-green-100">连续坚持天数</p>
                </div>
                
                <div class="bg-white/20 rounded-2xl p-4 mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm">距离下一个里程碑</span>
                        <span class="text-sm font-semibold">7天</span>
                    </div>
                    <div class="w-full bg-white/30 rounded-full h-2">
                        <div class="bg-white h-2 rounded-full" style="width: 0%"></div>
                    </div>
                </div>

                <!-- 打卡按钮 -->
                <button onclick="checkIn()" class="w-full bg-white text-primary font-bold py-3 rounded-2xl shadow-lg card-hover">
                    <i class="fas fa-check-circle mr-2"></i>今日打卡
                </button>
            </div>
        </div>

        <!-- Quick Stats -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-surface rounded-2xl p-4 text-center shadow-sm">
                <div class="text-2xl font-bold text-gray-800 mb-1">0%</div>
                <div class="text-xs text-gray-500">成功率</div>
            </div>
            <div class="bg-surface rounded-2xl p-4 text-center shadow-sm">
                <div class="text-2xl font-bold text-gray-800 mb-1">0</div>
                <div class="text-xs text-gray-500">最高纪录</div>
            </div>
            <div class="bg-surface rounded-2xl p-4 text-center shadow-sm">
                <div class="text-2xl font-bold text-gray-800 mb-1">L1</div>
                <div class="text-xs text-gray-500">当前等级</div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-4 gap-4 mb-6">
            <button onclick="goToPage('emergency.html')" class="flex flex-col items-center">
                <div class="w-12 h-12 bg-red-100 rounded-2xl flex items-center justify-center mb-2">
                    <i class="fas fa-sos text-red-500 text-xl"></i>
                </div>
                <span class="text-xs text-gray-600">紧急求助</span>
            </button>
            <button onclick="goToPage('assessment.html')" class="flex flex-col items-center">
                <div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center mb-2">
                    <i class="fas fa-chart-pie text-blue-500 text-xl"></i>
                </div>
                <span class="text-xs text-gray-600">自我评估</span>
            </button>
            <button onclick="goToPage('learning.html')" class="flex flex-col items-center">
                <div class="w-12 h-12 bg-purple-100 rounded-2xl flex items-center justify-center mb-2">
                    <i class="fas fa-book-open text-purple-500 text-xl"></i>
                </div>
                <span class="text-xs text-gray-600">学习内容</span>
            </button>
            <button onclick="goToPage('community.html')" class="flex flex-col items-center">
                <div class="w-12 h-12 bg-green-100 rounded-2xl flex items-center justify-center mb-2">
                    <i class="fas fa-users text-green-500 text-xl"></i>
                </div>
                <span class="text-xs text-gray-600">社区</span>
            </button>
        </div>

        <!-- Recent Achievements -->
        <div class="bg-surface rounded-2xl p-5 shadow-sm mb-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-gray-800">成就徽章</h3>
                <span class="text-xs text-gray-500">0/50</span>
            </div>
            <div class="flex space-x-3">
                <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center relative">
                    <i class="fas fa-lock text-gray-400"></i>
                </div>
                <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center relative">
                    <i class="fas fa-lock text-gray-400"></i>
                </div>
                <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center relative">
                    <i class="fas fa-lock text-gray-400"></i>
                </div>
                <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center relative">
                    <i class="fas fa-lock text-gray-400"></i>
                </div>
            </div>
            <p class="text-xs text-gray-400 mt-3 text-center">完成打卡即可解锁成就</p>
        </div>

        <!-- Tips Card -->
        <div class="bg-gradient-to-br from-secondary to-cyan-600 rounded-2xl p-5 text-white">
            <div class="flex items-start space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-lightbulb text-white"></i>
                </div>
                <div>
                    <h3 class="font-semibold mb-1">今日小贴士</h3>
                    <p class="text-sm text-cyan-100 leading-relaxed">
                        保持规律作息，每天运动30分钟，有助于培养健康的生活习惯
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-3">
        <div class="flex justify-around items-center">
            <button class="flex flex-col items-center text-primary">
                <i class="fas fa-home text-lg mb-1"></i>
                <span class="text-xs font-medium">首页</span>
            </button>
            <button onclick="goToPage('learning.html')" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-book text-lg mb-1"></i>
                <span class="text-xs">学习</span>
            </button>
            <button onclick="checkIn()" class="flex flex-col items-center text-gray-400 relative">
                <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center -mt-6 shadow-lg">
                    <i class="fas fa-plus text-white text-lg"></i>
                </div>
                <span class="text-xs mt-1">记录</span>
            </button>
            <button onclick="goToPage('community.html')" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-users text-lg mb-1"></i>
                <span class="text-xs">社区</span>
            </button>
            <button onclick="goToPage('profile.html')" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-user text-lg mb-1"></i>
                <span class="text-xs">我的</span>
            </button>
        </div>
    </div>

    <script>
        function checkIn() {
            alert('打卡成功！\\n\\n恭喜你完成今日打卡，继续加油！');
        }
        
        function goToPage(page) {
            window.location.href = page;
        }
    </script>
</body>
</html>
