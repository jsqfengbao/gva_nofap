<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用戒色助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#34D399',
                        secondary: '#06B6D4',
                        accent: '#F59E0B',
                        danger: '#EF4444',
                        success: '#10B981',
                        background: '#F8FAFC',
                        surface: '#FFFFFF'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #34D399 0%, #10B981 50%, #059669 100%);
        }
        .floating-animation {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-background h-screen overflow-hidden">
    <!-- Status Bar -->
    <div class="flex justify-between items-center px-4 py-2 text-xs text-gray-800">
        <span class="font-medium">9:41</span>
        <div class="flex items-center space-x-1">
            <i class="fas fa-signal text-xs"></i>
            <i class="fas fa-wifi text-xs"></i>
            <div class="w-6 h-3 border border-gray-800 rounded-sm">
                <div class="w-4 h-1.5 bg-green-500 rounded-sm mt-0.5 ml-0.5"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="gradient-bg flex-1 flex flex-col justify-between px-6 pb-8">
        <!-- Logo and Title Section -->
        <div class="text-center mt-16">
            <div class="floating-animation mb-8">
                <!-- App Icon -->
                <div class="w-24 h-24 bg-white rounded-3xl shadow-lg mx-auto flex items-center justify-center mb-6">
                    <i class="fas fa-seedling text-4xl text-primary"></i>
                </div>
            </div>
            
            <h1 class="text-3xl font-bold text-white mb-4">戒色助手</h1>
            <p class="text-lg text-green-100 leading-relaxed px-4">
                重获健康生活<br>
                开启全新的自己
            </p>
        </div>

        <!-- Features Preview -->
        <div class="space-y-4 mb-8">
            <div class="flex items-center space-x-4 text-white">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fas fa-chart-line text-white"></i>
                </div>
                <div>
                    <h3 class="font-semibold">科学评估系统</h3>
                    <p class="text-sm text-green-100">专业的依赖程度评估</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4 text-white">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fas fa-gamepad text-white"></i>
                </div>
                <div>
                    <h3 class="font-semibold">游戏化体验</h3>
                    <p class="text-sm text-green-100">升级打怪，成就满满</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4 text-white">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fas fa-users text-white"></i>
                </div>
                <div>
                    <h3 class="font-semibold">社区支持</h3>
                    <p class="text-sm text-green-100">匿名互助，共同成长</p>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="space-y-3">
            <button class="w-full bg-white text-primary font-semibold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                开始使用
            </button>
            
            <button class="w-full border-2 border-white/30 text-white font-semibold py-4 rounded-2xl active:scale-95 transition-transform">
                了解更多
            </button>
            
            <div class="text-center pt-4">
                <p class="text-xs text-green-100">
                    点击"开始使用"即表示您同意我们的
                    <span class="underline">服务协议</span> 和 <span class="underline">隐私政策</span>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
